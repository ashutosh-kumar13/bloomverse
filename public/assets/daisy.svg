<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <g filter="url(#watercolor)">
    <g transform="rotate(0)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(30)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(60)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(90)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(120)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(150)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(180)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(210)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(240)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(270)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(300)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <g transform="rotate(330)"><ellipse rx="15" ry="60" fill="white" stroke="#EEE" transform="translate(0,-30)"/></g>
    <circle r="25" fill="#FFD700" />
    <circle r="18" fill="#FFA500" opacity="0.5" />
  </g>
</svg>
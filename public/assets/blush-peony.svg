<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <g filter="url(#watercolor)">
    <g opacity="0.45">
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(0) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(45) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(90) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(135) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(180) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(225) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(270) translate(25,0)" />
      <ellipse rx="70" ry="45" fill="#FFD1DC" transform="rotate(315) translate(25,0)" />
    </g>
    <circle r="50" fill="#FFB6C1" opacity="0.8" />
    <circle r="15" fill="#FFD700" />
    <circle r="8" fill="#FFA500" opacity="0.6" />
  </g>
</svg>
<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <g filter="url(#watercolor)">
    <circle r="80" fill="#ADD8E6" opacity="0.15" />
    <g transform="translate(-30, -30)">
      <rect x="-15" y="-15" width="30" height="30" rx="5" fill="#B0C4DE" opacity="0.8" />
      <circle r="3" fill="#F0F8FF" />
    </g>
    <g transform="translate(30, -30)">
      <rect x="-15" y="-15" width="30" height="30" rx="5" fill="#E6E6FA" opacity="0.8" />
      <circle r="3" fill="#F0F8FF" />
    </g>
    <g transform="translate(-30, 30)">
      <rect x="-15" y="-15" width="30" height="30" rx="5" fill="#ADD8E6" opacity="0.8" />
      <circle r="3" fill="#F0F8FF" />
    </g>
    <g transform="translate(30, 30)">
      <rect x="-15" y="-15" width="30" height="30" rx="5" fill="#B0C4DE" opacity="0.8" />
      <circle r="3" fill="#F0F8FF" />
    </g>
    <g transform="translate(0, 0)">
      <rect x="-15" y="-15" width="30" height="30" rx="5" fill="#E6E6FA" opacity="0.8" />
      <circle r="3" fill="#F0F8FF" />
    </g>
  </g>
</svg>
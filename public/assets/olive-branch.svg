  <g filter="url(#watercolor)">
    <path d="M0 90 Q-10 0, 0-90" fill="none" stroke="#556B2F" strokeWidth="2" />
    <ellipse cx="-25" cy="-40" rx="30" ry="10" fill="#808000" opacity="0.7" transform="rotate(-30, -25, -40)" />
    <ellipse cx="25" cy="-20" rx="30" ry="10" fill="#808000" opacity="0.7" transform="rotate(30, 25, -20)" />
    <ellipse cx="-20" cy="20" rx="30" ry="10" fill="#808000" opacity="0.7" transform="rotate(-20, -20, 20)" />
    <circle cx="-10" cy="-20" r="8" fill="#2E4600" />
    <circle cx="10" cy="30" r="8" fill="#2E4600" />
  </g>

<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <g filter="url(#watercolor)">
    <g transform="rotate(0)"><path d="M0 0 Q40-40, 0-110 Q-40-40, 0 0" fill="white" stroke="#EEE" /></g>
    <g transform="rotate(60)"><path d="M0 0 Q40-40, 0-110 Q-40-40, 0 0" fill="white" stroke="#EEE" /></g>
    <g transform="rotate(120)"><path d="M0 0 Q40-40, 0-110 Q-40-40, 0 0" fill="white" stroke="#EEE" /></g>
    <g transform="rotate(180)"><path d="M0 0 Q40-40, 0-110 Q-40-40, 0 0" fill="white" stroke="#EEE" /></g>
    <g transform="rotate(240)"><path d="M0 0 Q40-40, 0-110 Q-40-40, 0 0" fill="white" stroke="#EEE" /></g>
    <g transform="rotate(300)"><path d="M0 0 Q40-40, 0-110 Q-40-40, 0 0" fill="white" stroke="#EEE" /></g>
    <circle r="12" fill="#FFE4B5" />
    <g transform="rotate(0)"><line y1="-10" y2="-30" stroke="#D2691E" strokeWidth="2" /></g>
    <g transform="rotate(120)"><line y1="-10" y2="-30" stroke="#D2691E" strokeWidth="2" /></g>
    <g transform="rotate(240)"><line y1="-10" y2="-30" stroke="#D2691E" strokeWidth="2" /></g>
  </g>
</svg>